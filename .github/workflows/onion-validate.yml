name: Onion Artifact Linter

# Porta pública Claude (instância adotada role-scoped). Roda o MESMO linter
# determinístico vendorizado do core — a guarda de SSOT do próprio door.
# NOTA: lint-selftest.sh e lint-design-tokens.sh NÃO são vendorizados (meta/design,
# fora do bundle 'standalone') → a CI do door cobre só o lint-artifacts determinístico.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.claude/**'
      - 'docs/**'
      - 'CLAUDE.md'

permissions:
  contents: read

jobs:
  lint-onion-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Executar linter determinístico de artefatos Onion
        run: bash .claude/validation/lint-artifacts.sh

      - name: Lembrete — checagens semânticas são locais
        run: |
          echo "---"
          echo "AVISO: cobre só validações DETERMINÍSTICAS (estrutura, YAML, frontmatter, nomenclatura, SSOT)."
          echo "Conformidade arquitetural semântica roda localmente (fora do escopo do CI)."
          echo "---"
